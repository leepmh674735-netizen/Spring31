<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPrint Blog - 일기 기록하기</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #FF7F50;
            --secondary-color: #FFB6C1;
            --bg-color: #FFF8F5;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --accent-color: #FFA07A;
        }

        body {
            font-family: 'Nunito', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
        }

        h1, h2, h3, .brand-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
        }

        /* Navbar Styling */
        .navbar {
            background-color: white;
            box-shadow: 0 4px 20px rgba(255, 127, 80, 0.08);
            border-bottom: 2px solid #FFEBE6;
        }

        .navbar-brand {
            font-size: 1.5rem;
            color: var(--primary-color) !important;
            display: flex;
            align-items: center;
        }

        /* Editor Card */
        .editor-card {
            background-color: white;
            border: none;
            border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(255, 127, 80, 0.08);
            border: 1px solid #FFF0EC;
            padding: 3rem 2.5rem;
            margin-top: 3rem;
            margin-bottom: 5rem;
        }

        .form-control {
            border-radius: 1rem;
            padding: 0.75rem 1.25rem;
            border: 2px solid #F0F0F0;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 127, 80, 0.25);
        }

        input#title.form-control {
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 1rem;
            padding: 1rem 1.5rem;
        }

        textarea#content.form-control {
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .btn-cancel {
            border-radius: 50px;
            font-weight: 700;
            border: 2px solid #DDD;
            background: white;
            color: var(--text-dark);
            padding: 0.6rem 1.5rem;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background-color: #F8F9FA;
            border-color: #CCC;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            padding: 0.6rem 2rem;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #E67246;
            box-shadow: 0 4px 12px rgba(255, 127, 80, 0.35);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top py-3">
        <div class="container">
            <a class="navbar-brand brand-title fw-bold" href="/articles">
                <span class="nav-paw me-2">🐾</span> PawPrint Blog
            </a>
            <div class="d-flex align-items-center">
                <button type="button" class="btn btn-outline-secondary rounded-pill fw-bold px-4 border-2"
                    onclick="location.href='/logout'">
                    <i class="bi bi-box-arrow-right me-1"></i> 로그아웃
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9">
                <div class="card editor-card">
                    <input type="hidden" id="article-id" th:value="${article.id}">
                    
                    <!-- Header Title -->
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-primary-subtle p-3 rounded-circle me-3 text-primary" style="background-color: #FFF5F2 !important; color: #FF7F50 !important;">
                            <i class="bi bi-journal-text fs-3"></i>
                        </div>
                        <div>
                            <h2 class="mb-1" th:if="${article.id} == null">새 일기 작성하기</h2>
                            <h2 class="mb-1" th:if="${article.id} != null">일기 내용 수정하기</h2>
                            <p class="text-muted mb-0 small">오늘 댕댕이에게는 어떤 귀여운 일이 있었나요?</p>
                        </div>
                    </div>

                    <!-- Input Form -->
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary ps-2">제목</label>
                        <input type="text" class="form-control" placeholder="제목을 입력하세요..."
                            id="title" th:value="${article.title}">
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label fw-bold text-secondary ps-2">내용</label>
                        <textarea class="form-control" rows="12" placeholder="일기 내용을 채워주세요🐾..."
                            id="content" th:text="${article.content}"></textarea>
                    </div>

                    <!-- Action Buttons -->
                    <div class="pt-4 border-top border-light-subtle d-flex justify-content-between">
                        <!-- Cancel Button (Conditional redirection) -->
                        <button th:if="${article.id} != null" type="button" class="btn btn-cancel"
                            th:onclick="|location.href='@{/articles/{id}(id=${article.id})}'|">취소</button>
                        <button th:if="${article.id} == null" type="button" class="btn btn-cancel"
                            onclick="location.href='/articles'">취소</button>
                        
                        <!-- Submit Button -->
                        <button th:if="${article.id} != null" type="button" id="modify-btn"
                            class="btn btn-submit">수정 완료</button>
                        <button th:if="${article.id} == null" type="button" id="create-btn"
                            class="btn btn-submit">등록 완료</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/article.js"></script>
</body>
</html>
