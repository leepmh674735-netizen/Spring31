<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPrint Blog - 일상 목록</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #FF7F50;
            --secondary-color: #FFB6C1;
            --bg-color: #FFF8F5;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --accent-color: #FFA07A;
        }

        body {
            font-family: 'Nunito', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
        }

        h1, h2, h3, .brand-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
        }

        /* Navbar Styling */
        .navbar {
            background-color: white;
            box-shadow: 0 4px 20px rgba(255, 127, 80, 0.08);
            border-bottom: 2px solid #FFEBE6;
        }

        .navbar-brand {
            font-size: 1.5rem;
            color: var(--primary-color) !important;
            display: flex;
            align-items: center;
        }

        @keyframes pawWiggle {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        .navbar-brand:hover .nav-paw {
            animation: pawWiggle 0.5s ease infinite;
        }

        /* Banner Styling */
        .jumbotron-banner {
            background: linear-gradient(135deg, #FFE6D5 0%, #FFD6DB 100%);
            border-radius: 2rem;
            padding: 3rem 2rem;
            margin-top: 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(255, 127, 80, 0.1);
            position: relative;
            overflow: hidden;
        }

        .jumbotron-banner::after {
            content: "🐾";
            position: absolute;
            bottom: -20px;
            right: -10px;
            font-size: 12rem;
            opacity: 0.08;
            transform: rotate(-25deg);
        }

        /* Card Styling */
        .article-card {
            background-color: white;
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            border: 1px solid #FFF0EC;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(255, 127, 80, 0.15);
            border-color: #FFD9D0;
        }

        .card-header-paw {
            background-color: #FFF5F2;
            border-bottom: none;
            color: var(--primary-color);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem 0.5rem;
        }

        .btn-paw {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            padding: 0.5rem 1.25rem;
            transition: all 0.2s ease;
        }

        .btn-paw:hover {
            background-color: #E67246;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 127, 80, 0.35);
        }

        .btn-outline-paw {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            background: transparent;
            border-radius: 50px;
            font-weight: 700;
            padding: 0.5rem 1.25rem;
            transition: all 0.2s ease;
        }

        .btn-outline-paw:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* Floating Action Button (FAB) */
        .fab-button {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF7F50 0%, #FF6B81 100%);
            box-shadow: 0 8px 25px rgba(255, 107, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            z-index: 1030;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 2.25rem;
        }

        .fab-button:hover {
            transform: scale(1.1) rotate(90deg);
            color: white;
            box-shadow: 0 12px 35px rgba(255, 107, 129, 0.6);
        }
        
        .fab-tooltip {
            position: fixed;
            bottom: 3.5rem;
            right: 8rem;
            background-color: var(--text-dark);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1029;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .fab-container:hover .fab-tooltip {
            opacity: 1;
        }

        /* Cute Empty State */
        .empty-state {
            padding: 4rem 2rem;
            background: white;
            border-radius: 2rem;
            border: 2px dashed #FFD9D0;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top py-3">
        <div class="container">
            <a class="navbar-brand brand-title fw-bold" href="/articles">
                <span class="nav-paw me-2">🐾</span> PawPrint Blog
            </a>
            <div class="d-flex align-items-center">
                <button type="button" class="btn btn-outline-secondary rounded-pill fw-bold px-4 border-2"
                    onclick="location.href='/logout'">
                    <i class="bi bi-box-arrow-right me-1"></i> 로그아웃
                </button>
            </div>
        </div>
    </nav>

    <!-- Content Container -->
    <div class="container">
        <!-- Jumbotron Banner -->
        <div class="jumbotron-banner text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-9">
                    <h1 class="display-5 text-primary-emphasis mb-2">우리집 댕댕이 육아 일기</h1>
                    <p class="lead mb-0 text-secondary-emphasis">소중한 일상과 기억을 기록하는 아기자기한 공간입니다.</p>
                </div>
                <div class="col-md-3 text-center d-none d-md-block">
                    <!-- Cute Animated SVG Logo -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="#FFF5F2" />
                        <!-- Paw Print -->
                        <circle cx="50" cy="52" r="14" fill="#FF7F50" />
                        <circle cx="28" cy="34" r="8" fill="#FF7F50" />
                        <circle cx="43" cy="24" r="8" fill="#FF7F50" />
                        <circle cx="57" cy="24" r="8" fill="#FF7F50" />
                        <circle cx="72" cy="34" r="8" fill="#FF7F50" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Post Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5">
            <!-- Thymeleaf Loop for Articles -->
            <div class="col" th:each="item : ${articles}">
                <div class="card h-100 article-card">
                    <!-- Header with ID or Paw Badge -->
                    <div class="card-header-paw">
                        <span class="badge rounded-pill bg-warning-subtle text-warning-emphasis px-3 py-2"><i class="bi bi-tag-fill me-1"></i> 일상</span>
                        <small class="text-muted fw-semibold">No. <span th:text="${item.id}">1</span></small>
                    </div>
                    
                    <div class="card-body d-flex flex-column p-4">
                        <h4 class="card-title fw-bold text-primary-emphasis mb-2" th:text="${item.title}">글 제목</h4>
                        <p class="card-text text-muted flex-grow-1" th:text="${item.content}">본문 요약 내용...</p>
                        
                        <div class="mt-4 pt-3 border-top border-light d-flex align-items-center justify-content-between">
                            <span class="text-secondary fw-semibold small">
                                <i class="bi bi-person-fill text-muted"></i> 댕집사
                            </span>
                            <a th:href="@{/articles/{id}(id=${item.id})}" class="btn btn-paw btn-sm">
                                보러가기 <i class="bi bi-arrow-right-short"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State (When no articles exist) -->
        <div class="row mb-5" th:if="${#lists.isEmpty(articles)}">
            <div class="col-12">
                <div class="empty-state text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-journal-x text-secondary mb-3" viewBox="0 0 16 16">
                        <path d="M10.854 6.146a.5.5 0 0 1 0 .708L8.707 9l2.147 2.146a.5.5 0 0 1-.708.708L8 9.707l-2.146 2.147a.5.5 0 0 1-.708-.708L7.293 9 5.146 6.854a.5.5 0 1 1 .708-.708L8 8.293l2.146-2.147a.5.5 0 0 1 .708 0z"/>
                        <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2zM2 2v12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1z"/>
                    </svg>
                    <h3 class="text-secondary-emphasis">작성된 글이 아직 없어요!</h3>
                    <p class="text-muted mb-4">댕댕이와 있었던 이야기를 첫 글로 남겨주세요 🐾</p>
                    <button type="button" class="btn btn-outline-paw px-4"
                        th:onclick="|location.href='@{/new-article}'|">첫 글 등록하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Action Button (FAB) Container -->
    <div class="fab-container d-none d-sm-block">
        <div class="fab-tooltip">일기 작성하기</div>
        <a th:href="@{/new-article}" class="fab-button">
            <i class="bi bi-pencil-fill" style="font-size: 1.5rem;"></i>
        </a>
    </div>

    <!-- Mobile Top Write Button (Only for smaller screens) -->
    <div class="d-sm-none position-fixed bottom-0 end-0 p-3" style="z-index: 1030;">
        <a th:href="@{/new-article}" class="btn btn-paw btn-lg shadow-lg rounded-circle d-flex align-items-center justify-content-center" style="width: 3.5rem; height: 3.5rem;">
            <i class="bi bi-pencil-fill"></i>
        </a>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/token.js"></script>
    <script src="/js/article.js"></script>
</body>
</html>
