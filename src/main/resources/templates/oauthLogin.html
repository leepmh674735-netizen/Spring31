<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPrint Blog - 로그인</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #FF7F50;
            --secondary-color: #FFB6C1;
            --bg-color: #FFF8F5;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
        }

        body {
            font-family: 'Nunito', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #FFF0E6 0%, #FFE6EA 100%);
            color: var(--text-dark);
            min-height: 100vh;
        }

        h1, h2, h3, .brand-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(255, 127, 80, 0.15);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .brand-logo {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        @keyframes pawShake {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(-10deg); }
            20% { transform: rotate(12deg); }
            30% { transform: rotate(-10deg); }
            40% { transform: rotate(9deg); }
            50% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        .paw-icon {
            animation: pawShake 2.5s infinite;
            display: inline-block;
            color: var(--primary-color);
        }

        .btn-google {
            color: #555;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px;
            background: white;
            border: 2px solid #EEE;
            padding: 0.75rem 1.5rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-google:hover {
            background-color: #F8F9FA;
            border-color: #DDD;
            transform: scale(1.02);
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }

        .btn-email {
            font-weight: 700;
            border-radius: 50px;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            background: transparent;
            padding: 0.75rem 1.5rem;
            transition: all 0.2s ease;
        }

        .btn-email:hover {
            background-color: var(--primary-color);
            color: white;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="card login-card p-4 p-md-5 text-center">
                    <!-- Cute SVG Dog Illustration -->
                    <div class="d-flex justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" class="mb-3">
                            <!-- Ears -->
                            <path d="M25,45 Q15,25 22,15 Q30,5 40,25 Z" fill="#D2B48C" />
                            <path d="M95,45 Q105,25 98,15 Q90,5 80,25 Z" fill="#D2B48C" />
                            <!-- Face -->
                            <circle cx="60" cy="65" r="40" fill="#F5F5DC" />
                            <!-- Inner Ear -->
                            <path d="M26,40 Q19,25 24,18 Q29,11 36,25 Z" fill="#FFC0CB" />
                            <path d="M94,40 Q101,25 96,18 Q91,11 84,25 Z" fill="#FFC0CB" />
                            <!-- Eyes -->
                            <circle cx="45" cy="58" r="5" fill="#2C3E50" />
                            <circle cx="75" cy="58" r="5" fill="#2C3E50" />
                            <!-- Blush -->
                            <circle cx="37" cy="66" r="6" fill="#FFC0CB" opacity="0.6" />
                            <circle cx="83" cy="66" r="6" fill="#FFC0CB" opacity="0.6" />
                            <!-- Snout -->
                            <ellipse cx="60" cy="72" rx="14" ry="10" fill="#E6D7C3" />
                            <!-- Nose -->
                            <polygon points="54,68 66,68 60,74" fill="#2C3E50" />
                            <!-- Mouth -->
                            <path d="M57,74 Q60,78 63,74" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </div>

                    <h1 class="brand-title text-primary-emphasis mb-2">PawPrint Blog <span class="paw-icon">🐾</span></h1>
                    <p class="text-secondary mb-4">나의 소중한 댕댕이와의 일상을 기록하는 블로그</p>
                    
                    <div class="d-grid gap-3 mt-2">
                        <!-- Social Google Login -->
                        <a href="/oauth2/authorization/google" class="btn btn-google btn-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" class="me-3">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                            </svg>
                            Google 계정으로 로그인
                        </a>

                        <!-- Email Login Redirect -->
                        <a href="/login" class="btn btn-email btn-lg">
                            <i class="bi bi-envelope-fill me-2"></i> 이메일 계정으로 로그인
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
