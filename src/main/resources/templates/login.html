<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPrint Blog - 이메일 로그인</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #FF7F50;
            --secondary-color: #FFB6C1;
            --bg-color: #FFF8F5;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
        }

        body {
            font-family: 'Nunito', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #FFF0E6 0%, #FFE6EA 100%);
            color: var(--text-dark);
            min-height: 100vh;
        }

        h1, h2, h3, .brand-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(255, 127, 80, 0.15);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .form-control {
            border-radius: 50px;
            padding: 0.75rem 1.25rem;
            border: 2px solid #EFEFEF;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 127, 80, 0.25);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            border-radius: 50px;
            font-weight: 700;
            padding: 0.75rem;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #E67246;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 127, 80, 0.3);
        }

        .btn-secondary {
            border-radius: 50px;
            font-weight: 700;
            border: 2px solid #DDD;
            background: white;
            color: var(--text-dark);
            padding: 0.75rem;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: #F8F9FA;
            border-color: #CCC;
            color: var(--text-dark);
        }

        .back-link {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: #E67246;
            transform: translateX(-3px);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="card login-card p-4 p-md-5">
                    
                    <!-- Cute SVG Dog Icon (Peeking) -->
                    <div class="text-center mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                            <!-- Ears -->
                            <path d="M20,40 Q10,25 18,15 Q25,5 35,25 Z" fill="#D2B48C" />
                            <path d="M80,40 Q90,25 82,15 Q75,5 65,25 Z" fill="#D2B48C" />
                            <!-- Face -->
                            <path d="M15,65 C15,40 85,40 85,65 C85,85 15,85 15,65 Z" fill="#F5F5DC" />
                            <!-- Eyes (half closed, friendly) -->
                            <path d="M35,52 Q40,48 45,52" fill="none" stroke="#2C3E50" stroke-width="4" stroke-linecap="round" />
                            <path d="M55,52 Q60,48 65,52" fill="none" stroke="#2C3E50" stroke-width="4" stroke-linecap="round" />
                            <!-- Blush -->
                            <circle cx="28" cy="62" r="5" fill="#FFC0CB" opacity="0.6" />
                            <circle cx="72" cy="62" r="5" fill="#FFC0CB" opacity="0.6" />
                            <!-- Nose & Mouth -->
                            <ellipse cx="50" cy="63" rx="10" ry="7" fill="#E6D7C3" />
                            <polygon points="45,60 55,60 50,65" fill="#2C3E50" />
                        </svg>
                    </div>

                    <h2 class="text-center text-primary-emphasis mb-2">이메일 로그인</h2>
                    <p class="text-center text-secondary mb-4">서비스를 이용하시려면 로그인해 주세요.</p>

                    <form action="/login" method="POST">
                        <!-- CSRF Token -->
                        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary ps-2">이메일 주소</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 rounded-start-pill text-secondary ps-3"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0 rounded-end-pill ps-2" name="username" placeholder="example@email.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary ps-2">비밀번호</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 rounded-start-pill text-secondary ps-3"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control border-start-0 rounded-end-pill ps-2" name="password" placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">로그인</button>
                            <button type="button" class="btn btn-secondary btn-lg" onclick="location.href='/signup'">회원가입</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="/login" class="back-link">
                            <i class="bi bi-arrow-left me-2"></i> 소셜 로그인으로 돌아가기
                        </a>
                    </div>

				</div>
			</div>
		</div>
	</div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
