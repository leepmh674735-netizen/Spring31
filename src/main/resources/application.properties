# JPA/Hibernate Common Settings
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Servlet Settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# OAuth2 Client Settings
spring.security.oauth2.client.registration.google.client-id=mock-google-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT Properties
jwt.accessValidTime=60000
jwt.refreshValidTime=600000
jwt.issuer=shinsunyoung
jwt.secretKey=study-springboot-secure-key-must-be-at-least-256-bits-long-for-hmac-sha

# Logging
logging.level.me.shinsunyoung.springbootdeveloper=debug
logging.level.com.winter=debug
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace