spring.application.name=dog-4
server.port=8181

# Active Profile: 'default' (Local H2) or 'supabase' (PostgreSQL)
spring.profiles.active=default

app.upload.base=C:/upload/

# Common JPA / Hibernate Settings
spring.sql.init.mode=always
spring.sql.init.encoding=utf-8
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.use_sql_comments=true

spring.thymeleaf.cache=false
spring.jackson.serialization.write-dates-as-timestamps=false

# File Upload Limit
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# OAuth2 Client Settings
spring.security.oauth2.client.registration.google.client-id=mock-google-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT Properties
jwt.accessValidTime=60000
jwt.refreshValidTime=600000
jwt.issuer=shinsunyoung
jwt.secretKey=study-springboot-secure-key-must-be-at-least-256-bits-long-for-hmac-sha-abcdefg1234567890

# Logging Levels
logging.level.me.shinsunyoung.springbootdeveloper=debug
logging.level.com.winter=debug
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.mybatis=debug

# Message Bundles
spring.messages.basename=messages/message
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true

# DevTools Settings
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# MyBatis Configuration
mybatis.configuration.cache-enabled=false
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.local-cache-scope=STATEMENT
mybatis.mapper-locations=classpath:mappers/**/*.xml

#---
# Default Profile: H2 Database (In-Memory for Local Testing)
spring.config.activate.on-profile=default

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

