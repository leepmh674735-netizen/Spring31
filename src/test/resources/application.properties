spring.application.name=dog-4-test
server.port=8181

# H2 Database for testing
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.defer-datasource-initialization=true

# OAuth2 Client Settings
spring.security.oauth2.client.registration.google.client-id=mock-google-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

jwt.issuer=shinsunyoung
jwt.secretKey=study-springboot-secure-key-must-be-at-least-256-bits-long-for-hmac-sha

logging.level.me.shinsunyoung.springbootdeveloper=debug
logging.level.org.hibernate.SQL=debug
